# SPDX-License-Identifier: Apache-2.0
# Project Configuration for Cochlear Implant DSP Applications
# Target: nRF54L15

# =============================================================================
# Logging Configuration
# =============================================================================
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3
CONFIG_LOG_BACKEND_UART=y
CONFIG_LOG_MODE_IMMEDIATE=y

# =============================================================================
# Console/UART Configuration
# =============================================================================
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y
CONFIG_PRINTK=y
CONFIG_SERIAL=y
CONFIG_UART_INTERRUPT_DRIVEN=y

# Increase UART buffer for audio data transfer
CONFIG_UART_0_NRF_TX_BUFFER_SIZE=256

# =============================================================================
# Audio/PDM Configuration (for microphone integration)
# =============================================================================
CONFIG_AUDIO=y
CONFIG_AUDIO_DMIC=y
CONFIG_NRFX_PDM=y

# =============================================================================
# GPIO Configuration
# =============================================================================
CONFIG_GPIO=y

# =============================================================================
# Memory Configuration for DSP Processing
# =============================================================================
# Hearing Aid DSP requires significant memory for:
# - FFT buffers (256-point complex floats)
# - Multi-band compression state
# - Noise estimation arrays
# - Overlap-add buffers
CONFIG_HEAP_MEM_POOL_SIZE=32768
CONFIG_MAIN_STACK_SIZE=16384

# =============================================================================
# Floating Point Support
# =============================================================================
CONFIG_FPU=y
CONFIG_FPU_SHARING=y
CONFIG_CBPRINTF_FP_SUPPORT=y

# =============================================================================
# C Library (required for math functions)
# =============================================================================
CONFIG_NEWLIB_LIBC=y
CONFIG_NEWLIB_LIBC_NANO=n

# =============================================================================
# Debugging Support
# =============================================================================
CONFIG_USE_SEGGER_RTT=y
CONFIG_RTT_CONSOLE=n

# =============================================================================
# Performance Optimizations
# =============================================================================
CONFIG_SPEED_OPTIMIZATIONS=y
