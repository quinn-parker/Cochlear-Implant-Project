# SPDX-License-Identifier: Apache-2.0
# Project Configuration for Cochlear Implant DSP Applications
# Target: nRF54L15

# =============================================================================
# Logging Configuration
# =============================================================================
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3
CONFIG_LOG_BACKEND_UART=y
CONFIG_LOG_MODE_IMMEDIATE=y

# =============================================================================
# Console/UART Configuration
# =============================================================================
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y
CONFIG_PRINTK=y
CONFIG_SERIAL=y
CONFIG_UART_INTERRUPT_DRIVEN=y

# Increase UART buffer for audio data transfer
CONFIG_UART_0_NRF_TX_BUFFER_SIZE=256

# =============================================================================
# Audio/PDM Configuration (for microphone integration)
# =============================================================================
CONFIG_AUDIO=y
CONFIG_AUDIO_DMIC=y
CONFIG_NRFX_PDM=y

# =============================================================================
# GPIO Configuration
# =============================================================================
CONFIG_GPIO=y

# =============================================================================
# Memory Configuration for DSP Processing + BLE
# =============================================================================
CONFIG_HEAP_MEM_POOL_SIZE=65536
CONFIG_MAIN_STACK_SIZE=32768
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=4096

# =============================================================================
# Floating Point Support
# =============================================================================
CONFIG_FPU=y
CONFIG_FPU_SHARING=y
CONFIG_CBPRINTF_FP_SUPPORT=y

# =============================================================================
# C Library (required for math functions)
# =============================================================================
CONFIG_NEWLIB_LIBC=y
CONFIG_NEWLIB_LIBC_NANO=n

# =============================================================================
# Debugging Support
# =============================================================================
CONFIG_USE_SEGGER_RTT=y
CONFIG_RTT_CONSOLE=n

# =============================================================================
# Bluetooth Low Energy Configuration
# =============================================================================
CONFIG_BT=y
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_DEVICE_NAME="BoneCond HA"
CONFIG_BT_DEVICE_APPEARANCE=0x0941
CONFIG_BT_MAX_CONN=1
CONFIG_BT_GATT_DYNAMIC_DB=n
CONFIG_BT_ATT_TX_COUNT=10
CONFIG_BT_L2CAP_TX_BUF_COUNT=10
CONFIG_BT_BUF_ACL_RX_SIZE=502
CONFIG_BT_BUF_ACL_TX_SIZE=502
CONFIG_BT_CTLR_DATA_LENGTH_MAX=251
CONFIG_BT_USER_DATA_LEN_UPDATE=y

# =============================================================================
# Performance Optimizations
# =============================================================================
CONFIG_SPEED_OPTIMIZATIONS=y
