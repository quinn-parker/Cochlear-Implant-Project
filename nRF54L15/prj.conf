# SPDX-License-Identifier: Apache-2.0
# Project Configuration for FFT Waveform Analyzer v1.0

# Logging
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3
CONFIG_LOG_BACKEND_UART=y
CONFIG_LOG_MODE_IMMEDIATE=y

# Console/Shell for output
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y
CONFIG_PRINTK=y

# UART configuration for waveform upload
CONFIG_SERIAL=y
CONFIG_UART_INTERRUPT_DRIVEN=y

# Audio/PDM Configuration (for future integration)
CONFIG_AUDIO=y
CONFIG_AUDIO_DMIC=y

# NRFX PDM driver (for future integration)
CONFIG_NRFX_PDM=y

# GPIO for mic power control if needed
CONFIG_GPIO=y

# Heap and stack sizes for FFT buffers
# FFT requires significant memory: 256-point FFT with complex floats
CONFIG_HEAP_MEM_POOL_SIZE=16384
CONFIG_MAIN_STACK_SIZE=8192

# Enable floating point for FFT calculations
CONFIG_FPU=y
CONFIG_FPU_SHARING=y

# Standard C library for math functions (sin, cos, sqrt, log10)
CONFIG_NEWLIB_LIBC=y
CONFIG_NEWLIB_LIBC_NANO=n

# RTT for debugging (optional, can use alongside UART)
CONFIG_USE_SEGGER_RTT=y
CONFIG_RTT_CONSOLE=n

# Enable hardware floating point unit optimizations
CONFIG_CBPRINTF_FP_SUPPORT=y
