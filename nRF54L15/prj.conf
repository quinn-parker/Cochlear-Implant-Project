# Project Configuration for PDM Microphone Waveform Test

# Logging
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3
CONFIG_LOG_BACKEND_UART=y
CONFIG_LOG_MODE_IMMEDIATE=y

# Console/Shell for output
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y
CONFIG_PRINTK=y

# Audio/PDM Configuration
CONFIG_AUDIO=y
CONFIG_AUDIO_DMIC=y

# NRFX PDM driver
CONFIG_NRFX_PDM=y

# GPIO for mic power control if needed
CONFIG_GPIO=y

# Heap and stack sizes for audio buffers
CONFIG_HEAP_MEM_POOL_SIZE=8192
CONFIG_MAIN_STACK_SIZE=4096

# Enable floating point for waveform calculations
CONFIG_FPU=y

# RTT for debugging (optional, can use alongside UART)
CONFIG_USE_SEGGER_RTT=y
CONFIG_RTT_CONSOLE=n
